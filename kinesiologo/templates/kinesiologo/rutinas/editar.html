{% extends 'kinesiologo/base.html' %}

{% block title %}Editar Rutina - TeleRehab{% endblock %}

{% block content %}
<div class="animate-fade-in-up">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-white">Editar Rutina</h1>
        <a href="{% url 'detalle_rutina' rutina.id %}" class="text-zinc-400 hover:text-white transition">
            <i class="fas fa-arrow-left mr-2"></i> Volver
        </a>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div class="rounded-2xl border border-white/10 bg-white/[0.03] backdrop-blur-sm p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Paciente *</label>
                    <select name="paciente" required 
                            class="w-full px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-teal-500" 
                            style="background: #1e293b; color: #ffffff; border: 1px solid #3f3f46;">
                        {% for paciente in pacientes %}
                            <option value="{{ paciente.id }}" {% if rutina.paciente.id == paciente.id %}selected{% endif %}>
                                {{ paciente.nombre }} - {{ paciente.rut }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Título de la rutina *</label>
                    <input type="text" name="titulo" required value="{{ rutina.titulo }}" 
                           class="w-full px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-teal-500" 
                           style="background: #1e293b; color: #ffffff; border: 1px solid #3f3f46;">
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Descripción *</label>
                    <textarea name="descripcion" rows="2" required 
                              class="w-full px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-teal-500" 
                              style="background: #1e293b; color: #ffffff; border: 1px solid #3f3f46;">{{ rutina.descripcion }}</textarea>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Ejercicios (descripción detallada) *</label>
                    <textarea name="ejercicios" rows="4" required 
                              class="w-full px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-teal-500" 
                              style="background: #1e293b; color: #ffffff; border: 1px solid #3f3f46;">{{ rutina.ejercicios }}</textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">URL del video</label>
                    <input type="url" name="video_url" value="{{ rutina.video_url }}" 
                           class="w-full px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-teal-500" 
                           style="background: #1e293b; color: #ffffff; border: 1px solid #3f3f46;" 
                           placeholder="https://...">
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Duración (minutos)</label>
                    <input type="number" name="duracion_minutos" value="{{ rutina.duracion_minutos }}" min="1" 
                           class="w-full px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-teal-500" 
                           style="background: #1e293b; color: #ffffff; border: 1px solid #3f3f46;">
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Frecuencia</label>
                    <select name="frecuencia" 
                            class="w-full px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-teal-500" 
                            style="background: #1e293b; color: #ffffff; border: 1px solid #3f3f46;">
                        <option value="diaria" {% if rutina.frecuencia == 'diaria' %}selected{% endif %}>Diaria</option>
                        <option value="lunes_miercoles_viernes" {% if rutina.frecuencia == 'lunes_miercoles_viernes' %}selected{% endif %}>Lunes, Miércoles y Viernes</option>
                        <option value="martes_jueves" {% if rutina.frecuencia == 'martes_jueves' %}selected{% endif %}>Martes y Jueves</option>
                        <option value="personalizada" {% if rutina.frecuencia == 'personalizada' %}selected{% endif %}>Personalizada</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Estado</label>
                    <select name="estado" 
                            class="w-full px-4 py-2 rounded focus:outline-none focus:ring-2 focus:ring-teal-500" 
                            style="background: #1e293b; color: #ffffff; border: 1px solid #3f3f46;">
                        <option value="activa" {% if rutina.estado == 'activa' %}selected{% endif %}>Activa</option>
                        <option value="pausada" {% if rutina.estado == 'pausada' %}selected{% endif %}>Pausada</option>
                        <option value="completada" {% if rutina.estado == 'completada' %}selected{% endif %}>Completada</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="flex justify-end space-x-4">
            <a href="{% url 'detalle_rutina' rutina.id %}" class="px-6 py-2 border rounded hover:bg-white/5 transition text-zinc-300" style="border-color: #3f3f46;">Cancelar</a>
            <button type="submit" class="bg-teal-600 text-white px-6 py-2 rounded hover:bg-teal-700 transition shadow-lg shadow-teal-600/20">
                <i class="fas fa-save mr-2"></i> Actualizar rutina
            </button>
        </div>
    </form>
</div>
{% endblock %}

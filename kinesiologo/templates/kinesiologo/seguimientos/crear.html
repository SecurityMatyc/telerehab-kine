{% extends 'kinesiologo/base.html' %}

{% block title %}Nuevo Seguimiento - TeleRehab{% endblock %}

{% block content %}
<div class="animate-fade-in-up">
    <div class="flex justify-between items-center mb-6">
        <h1 class="text-2xl font-bold text-white">Nuevo Seguimiento</h1>
        <a href="{% url 'lista_seguimientos' %}" class="text-zinc-400 hover:text-white transition">
            <i class="fas fa-arrow-left mr-2"></i> Volver
        </a>
    </div>

    <form method="POST" class="space-y-6">
        {% csrf_token %}
        
        <div class="rounded-2xl border border-white/10 bg-white/[0.03] backdrop-blur-sm p-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Paciente *</label>
                    <select name="paciente" required 
                            class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded focus:outline-none focus:ring-2 focus:ring-teal-500 text-white">
                        <option value="">Seleccionar...</option>
                        {% for p in pacientes %}
                            <option value="{{ p.id }}" {% if request.GET.paciente == p.id|stringformat:"s" %}selected{% endif %}>
                                {{ p.nombre }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Tipo de control *</label>
                    <select name="tipo_control" 
                            class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded focus:outline-none focus:ring-2 focus:ring-teal-500 text-white">
                        <option value="presencial">Control presencial</option>
                        <option value="telefonico">Control telefónico</option>
                        <option value="whatsapp">Vía WhatsApp</option>
                        <option value="cartilla">Revisión de cartilla</option>
                    </select>
                </div>
                <div class="flex items-center h-12">
                    <input type="checkbox" name="cumple_ejercicios" id="cumple_ejercicios" 
                           class="w-4 h-4 bg-zinc-800 border-zinc-700 rounded focus:ring-2 focus:ring-teal-500 text-teal-500">
                    <label for="cumple_ejercicios" class="ml-2 text-sm text-zinc-300">El paciente cumplió los ejercicios</label>
                </div>
                <div class="flex items-center h-12">
                    <input type="checkbox" name="acompanante_presente" id="acompanante_presente" 
                           class="w-4 h-4 bg-zinc-800 border-zinc-700 rounded focus:ring-2 focus:ring-teal-500 text-teal-500">
                    <label for="acompanante_presente" class="ml-2 text-sm text-zinc-300">Acompañante presente</label>
                </div>
                <div class="md:col-span-2">
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Observaciones</label>
                    <textarea name="observaciones" rows="3" 
                              class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded focus:outline-none focus:ring-2 focus:ring-teal-500 text-white placeholder-zinc-500" 
                              placeholder="Observaciones sobre el seguimiento..."></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium text-zinc-300 mb-1">Próximo control</label>
                    <input type="text" name="fecha_proximo_control" 
                           class="w-full px-4 py-2 bg-zinc-800 border border-zinc-700 rounded focus:outline-none focus:ring-2 focus:ring-teal-500 text-white placeholder-zinc-500 flatpickr-input"
                           placeholder="Selecciona una fecha..."
                           id="fecha_proximo_control">
                </div>
            </div>
        </div>

        <div class="flex justify-end space-x-4">
            <a href="{% url 'lista_seguimientos' %}" class="px-6 py-2 border border-zinc-700 rounded hover:bg-white/5 transition text-zinc-300">Cancelar</a>
            <button type="submit" class="bg-teal-600 text-white px-6 py-2 rounded hover:bg-teal-700 transition shadow-lg shadow-teal-600/20">
                <i class="fas fa-save mr-2"></i> Guardar seguimiento
            </button>
        </div>
    </form>
</div>

<script>
    // Inicializar Flatpickr en el input de fecha
    document.addEventListener('DOMContentLoaded', function() {
        const fechaInput = document.getElementById('fecha_proximo_control');
        if (fechaInput) {
            flatpickr(fechaInput, {
                locale: 'es',
                dateFormat: 'Y-m-d',
                altInput: true,
                altFormat: 'd/m/Y',
                allowInput: true,
                disableMobile: true,
                theme: 'dark',
                placeholder: 'Selecciona una fecha...',
                position: 'auto',
                onChange: function(selectedDates, dateStr, instance) {
                    // Forzar el valor en el input original
                    instance.input.value = dateStr;
                    console.log('Fecha seleccionada:', dateStr);
                },
                onClose: function(selectedDates, dateStr, instance) {
                    if (dateStr) {
                        instance.input.value = dateStr;
                    }
                }
            });
        }
    });
</script>
{% endblock %}
